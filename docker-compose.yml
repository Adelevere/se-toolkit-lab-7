services:
  postgres:
    image: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lms
      DB_USER: lms_user
      DB_PASSWORD: change_this_strong_password_123
      BACKEND_NAME: ${BACKEND_NAME:-"Learning Management Service"}
      BACKEND_DEBUG: ${BACKEND_DEBUG:-false}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-false}
      LMS_API_KEY: ${LMS_API_KEY:-my-secret-api-key}
    ports:
      - "42002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LMS_API_URL: http://backend:8000
      LLM_API_BASE_URL: http://host.docker.internal:42005/v1
      LLM_API_KEY: ${LLM_API_KEY}
      LMS_API_KEY: ${LMS_API_KEY:-my-secret-api-key}
    depends_on:
      - backend
    networks:
      - lms-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  caddy:
    image: ${REGISTRY_PREFIX:-harbor.pg.innopolis.university/docker-hub-cache/}caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - lms-network
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  lms-network:
    driver: bridge
